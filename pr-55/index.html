<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kollektiv.Sanntid.org</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
  <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)">
  <script>
    (function () {
      var stored = localStorage.getItem('kollektiv-theme');
      var isLight;
      if (stored === 'light') {
        isLight = true;
      } else if (stored === 'dark') {
        isLight = false;
      } else {
        // auto / unset — follow OS
        isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      }
      var color = isLight ? '#f5f7fa' : '#0b0f1a';

      // Apply theme class before CSS renders so --bg-solid resolves correctly.
      if (isLight) document.documentElement.classList.add('theme-light');

      // Force background-color directly on <html> so Chrome mobile's compositor
      // uses it for the gap behind the retracting address bar. CSS custom
      // properties via class toggling are not always re-evaluated for that area.
      document.documentElement.style.backgroundColor = color;

      // Collapse the two media-query theme-color metas into one unconditional
      // tag when the user has an explicit (non-auto) preference.
      if (stored === 'light' || stored === 'dark') {
        var metas = document.querySelectorAll('meta[name="theme-color"]');
        if (metas[1]) metas[1].remove();
        if (metas[0]) { metas[0].removeAttribute('media'); metas[0].content = color; }
      }
    })();
  </script>
  <meta name="description" content="Real-time public transport departure board for Norway. Track buses, trams, metro, trains, ferries, and coaches with live departure times from any station or stop." />
  <meta name="keywords" content="Norway, public transport, departure board, real-time, bus, tram, metro, train, ferry, Entur, sanntid, kollektiv" />
  <meta name="author" content="Arnulf Heimsbakk" />
  <link rel="me" href="https://github.com/aheimsbakk/kollektiv-sanntid-org" />
  <link rel="canonical" href="https://kollektiv.sanntid.org/" />
 </head>
<body>
  <div id="app" class="app-root"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
